<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteVerse — Your Magical Note-Taking Universe</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪔</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Supabase JS client (UMD) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="main.css" />
</head>
<body>

  <!-- ═══════════════ AUTH SCREEN ═══════════════ -->
  <div id="auth-screen">
    <canvas id="stars-canvas"></canvas>
    <div class="auth-card">
      <div class="auth-logo">
        <span class="lamp-icon" aria-hidden="true">🪔</span>
        <h1>NoteVerse</h1>
        <p>Your magical note-taking universe</p>
      </div>
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN -->
      <div id="login-form" role="tabpanel">
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" placeholder="Your password" autocomplete="current-password" />
        </div>
        <button class="auth-btn" id="login-btn" onclick="doLogin()">✨ Enter the Universe</button>
        <p class="auth-error" id="login-error" aria-live="polite"></p>
      </div>

      <!-- REGISTER -->
      <div id="register-form" role="tabpanel" hidden>
        <div class="auth-field">
          <label for="reg-username">Display Name</label>
          <input type="text" id="reg-username" placeholder="What should we call you?" autocomplete="nickname" />
        </div>
        <div class="auth-field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="auth-field">
          <label for="reg-pass">Password</label>
          <input type="password" id="reg-pass" placeholder="At least 8 characters" autocomplete="new-password" />
        </div>
        <div class="auth-field">
          <label for="reg-pass2">Confirm Password</label>
          <input type="password" id="reg-pass2" placeholder="Repeat password" autocomplete="new-password" />
        </div>
        <button class="auth-btn" id="register-btn" onclick="doRegister()">🚀 Create Account</button>
        <p class="auth-error" id="reg-error" aria-live="polite"></p>
        <p class="auth-success" id="reg-success" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <!-- ═══════════════ MAIN APP ═══════════════ -->
  <div id="app" hidden>

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-logo">
        <span aria-hidden="true">🪔</span> NoteVerse
      </div>
      <div class="topbar-right">
        <div class="sync-status" id="sync-status" title="Sync status">
          <span id="sync-icon">☁️</span>
          <span id="sync-label">Synced</span>
        </div>
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode">
          <span id="theme-icon">🌙</span> <span id="theme-label">Dark Mode</span>
        </button>
        <div class="user-pill">
          <div class="user-avatar" id="user-avatar" aria-hidden="true">?</div>
          <span id="user-display">User</span>
        </div>
        <button class="logout-btn" onclick="doLogout()">Sign Out</button>
      </div>
    </header>

    <div class="main-layout">

      <!-- LEFT SIDEBAR -->
      <aside class="sidebar" aria-label="Notes list">
        <div class="sidebar-header">
          <div class="sidebar-title">📓 My Notes</div>
          <button class="new-note-btn" onclick="newNote()">+ New Note</button>
        </div>
        <div class="notes-list" id="notes-list" role="list"></div>
      </aside>

      <!-- EDITOR AREA -->
      <main class="editor-area">
        <div class="editor-toolbar" id="editor-toolbar" hidden>
          <input class="note-title-input" id="note-title" placeholder="Note title…" aria-label="Note title" oninput="onTitleChange()" />
          <span class="save-indicator" id="save-indicator">Saved ✓</span>
        </div>
        <div id="editor-wrap" hidden>
          <div class="mac-window">
            <div class="mac-titlebar" aria-hidden="true">
              <div class="mac-dot red"></div>
              <div class="mac-dot yellow"></div>
              <div class="mac-dot green"></div>
              <div class="mac-title" id="mac-filename">untitled.txt</div>
            </div>
            <div
              class="word-editor"
              id="word-editor"
              contenteditable="true"
              role="textbox"
              aria-multiline="true"
              aria-label="Note content"
              data-placeholder="Start typing your notes here… ✍️"
              oninput="onEditorChange()"
              spellcheck="true"
            ></div>
          </div>
        </div>
        <div class="empty-state" id="empty-state">
          <div class="big-emoji" aria-hidden="true">🌟</div>
          <h2>Welcome to NoteVerse</h2>
          <p>Create a new note to begin your<br />magical writing adventure!</p>
        </div>
      </main>

      <!-- AI SIDEBAR: disabled (no API key configured) -->

    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="notes.js"></script>
  <script src="app.js"></script>
</body>
</html>
